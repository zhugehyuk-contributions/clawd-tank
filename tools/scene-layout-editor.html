<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clawd Tank — Scene Layout Editor</title>
<style>
  :root { --zoom: 3; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }

  .sidebar {
    width: 360px; min-width: 360px; background: #12121f; padding: 16px; overflow-y: auto;
    border-right: 1px solid #333; display: flex; flex-direction: column; gap: 12px;
  }
  .sidebar h2 { font-size: 16px; margin-bottom: 2px; }
  .sidebar .sub { font-size: 11px; color: #666; margin-bottom: 8px; }

  .ctrl-group {
    background: #1e1e35; border-radius: 8px; padding: 12px; border: 2px solid #2a2a45;
    transition: border-color .15s;
  }
  .ctrl-group.selected { border-color: #0082FC; }
  .ctrl-group h3 { font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .ctrl-group .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .ctrl-row label { width: 50px; color: #aaa; flex-shrink: 0; }
  .ctrl-row input[type="range"] { flex: 1; accent-color: #0082FC; }
  .ctrl-row .num {
    background: #12121f; border: 1px solid #333; color: #0082FC; padding: 2px 4px;
    border-radius: 4px; font-size: 11px; font-family: monospace; text-align: right;
    -moz-appearance: textfield;
  }
  .ctrl-row .num::-webkit-inner-spin-button,
  .ctrl-row .num::-webkit-outer-spin-button { opacity: 0.3; }
  .ctrl-row .num:focus { border-color: #0082FC; outline: none; }
  .ctrl-row select {
    flex: 1; background: #12121f; border: 1px solid #333; color: #eee; padding: 4px 6px;
    border-radius: 4px; font-size: 11px;
  }

  .btn { padding: 5px 10px; border: 1px solid #444; background: #2a2a45; color: #eee; border-radius: 6px; cursor: pointer; font-size: 11px; transition: background .15s; }
  .btn:hover { background: #3a3a55; }
  .btn-primary { background: #0082FC; border-color: #0082FC; }
  .btn-primary:hover { background: #006fd6; }
  .btn-danger { background: #c0392b; border-color: #c0392b; font-size: 10px; padding: 3px 8px; }
  .btn-danger:hover { background: #a93226; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

  .mode-toggle { display: flex; gap: 0; border-radius: 6px; overflow: hidden; border: 1px solid #444; }
  .mode-toggle button { flex: 1; padding: 7px; background: #1e1e35; color: #aaa; border: none; cursor: pointer; font-size: 12px; }
  .mode-toggle button.active { background: #0082FC; color: #fff; }

  .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: auto; }
  .display-frame { position: relative; border: 2px solid #444; border-radius: 4px; overflow: hidden; background: #080812; }

  /* SVG sprite images */
  .sprite-img { position: absolute; pointer-events: none; image-rendering: pixelated; }

  /* Drag handles */
  .sprite-handle {
    position: absolute; cursor: grab; border: 2px solid transparent; border-radius: 3px;
    transition: border-color .1s; z-index: 10;
  }
  .sprite-handle:hover { border-color: rgba(0,130,252,.4); background: rgba(0,130,252,.05); }
  .sprite-handle.dragging { border-color: #0082FC; cursor: grabbing; z-index: 100; }
  .sprite-handle.selected { border-color: #0082FC; box-shadow: 0 0 8px rgba(0,130,252,.3); background: rgba(0,130,252,.03); }
  .sprite-label {
    position: absolute; top: -16px; left: 0; font-size: 9px; white-space: nowrap;
    pointer-events: none; font-family: monospace; text-shadow: 0 1px 3px rgba(0,0,0,.8);
  }

  .coord-readout {
    position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,.75);
    padding: 3px 7px; border-radius: 3px; font-size: 10px; font-family: monospace;
    color: #0082FC; pointer-events: none; z-index: 20;
  }

  .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #888; }
  .toggle-row input { accent-color: #0082FC; }

  .export-box {
    background: #0a0a15; border: 1px solid #333; border-radius: 6px; padding: 8px;
    font-family: monospace; font-size: 10px; color: #4CAF50; white-space: pre-wrap;
    max-height: 180px; overflow-y: auto; word-break: break-all; line-height: 1.6;
  }

  .body-info { font-size: 9px; color: #555; font-family: monospace; margin-top: 4px; }
</style>
</head>
<body>

<div class="sidebar">
  <div>
    <h2>Scene Layout Editor</h2>
    <p class="sub">Drag sprites on the display. Choose animations from dropdowns. Arrow keys to nudge (Shift=8px).<br>
    <span style="color:#4CAF50">Green line</span> = grass top (y=158). <span style="color:#FF5252">Red line</span> = foot target (y=166, 8px into grass like firmware).</p>
  </div>

  <div class="mode-toggle">
    <button id="mode-full" class="active" onclick="setMode('full')">Full (320×172)</button>
    <button id="mode-narrow" onclick="setMode('narrow')">Narrow (107×172)</button>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="addSprite('clawd')">+ Clawd</button>
    <button class="btn" onclick="addSprite('mini-crab')">+ Mini-Crab</button>
    <button class="btn" onclick="addHudCounter()">+ HUD Counter</button>
  </div>

  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <div class="toggle-row"><input type="checkbox" id="show-grass" checked onchange="render()"><label for="show-grass">Grass</label></div>
    <div class="toggle-row"><input type="checkbox" id="show-divider" onchange="render()"><label for="show-divider">Divider</label></div>
    <div class="toggle-row"><input type="checkbox" id="show-grid" onchange="render()"><label for="show-grid">Grid</label></div>
    <div class="toggle-row"><input type="checkbox" id="snap-grid" checked><label for="snap-grid">Snap</label></div>
  </div>

  <div id="sprite-controls"></div>

  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <span style="font-size:13px;font-weight:600;">Export / Import</span>
      <div style="display:flex;gap:4px;">
        <button class="btn" onclick="showImport()">Import</button>
        <button class="btn" onclick="copyExport(event)">Copy</button>
      </div>
    </div>
    <div id="export-box" class="export-box">Add sprites to see export...</div>
    <div id="import-area" style="display:none;margin-top:8px;">
      <textarea placeholder="Paste JSON here..." style="width:100%;height:60px;background:#0a0a15;border:1px solid #333;color:#eee;border-radius:6px;padding:8px;font-family:monospace;font-size:11px;resize:vertical;"></textarea>
      <button class="btn btn-primary" style="margin-top:4px;width:100%;" onclick="doImport()">Import Layout</button>
    </div>
  </div>

  <div>
    <span style="font-size:13px;font-weight:600;display:block;margin-bottom:6px;">Presets</span>
    <div class="btn-row">
      <button class="btn" onclick="loadPreset('1s0a')">1 Clawd</button>
      <button class="btn" onclick="loadPreset('1s3a')">1+3 mini</button>
      <button class="btn" onclick="loadPreset('2s2a')">2+2 mini</button>
      <button class="btn" onclick="loadPreset('narrow')">Narrow 1+3</button>
    </div>
  </div>
</div>

<div class="canvas-area">
  <div class="display-frame" id="display-frame">
    <canvas id="canvas"></canvas>
    <div id="sprite-layer"></div>
    <div id="handle-layer"></div>
    <div class="coord-readout" id="coord-readout">x=0 y=0</div>
  </div>
</div>

<script>
const DW = 320, DH = 172, Z = 3, DIV_X = 107;
// Firmware layout: grass is 14px tall at scene bottom, sprites sit 8px into grass
const GRASS_HEIGHT = 14;
const GRASS_TOP = DH - GRASS_HEIGHT; // y=158
const GROUND_OFFSET = 8; // y_offset in firmware — feet go 8px below grass top
const FOOT_Y = GRASS_TOP + GROUND_OFFSET; // y=166 — where sprite feet land
const SVG_DIR = '../assets/svg-animations/';

// ═══ Animation catalog ═══
const ANIMS = {
  clawd: [
    { id: 'typing',      label: 'Typing',       file: 'clawd-working-typing.svg',      vb: [-15,-25,45,45] },
    { id: 'thinking',    label: 'Thinking',     file: 'clawd-working-thinking.svg',    vb: [-15,-25,45,45] },
    { id: 'building',    label: 'Building',     file: 'clawd-working-building.svg',    vb: [-15,-25,45,45] },
    { id: 'juggling',    label: 'Juggling',     file: 'clawd-working-juggling.svg',    vb: [-15,-25,45,45] },
    { id: 'conducting',  label: 'Conducting',   file: 'clawd-working-conducting.svg',  vb: [-15,-25,45,45] },
    { id: 'confused',    label: 'Confused',     file: 'clawd-working-confused.svg',    vb: [-15,-25,45,45] },
    { id: 'sweeping',    label: 'Sweeping',     file: 'clawd-working-sweeping.svg',    vb: [-15,-25,45,45] },
    { id: 'wizard',      label: 'Wizard',       file: 'clawd-working-wizard.svg',      vb: [-15,-25,45,45] },
    { id: 'debugger',    label: 'Debugger',     file: 'clawd-working-debugger.svg',    vb: [-15,-25,45,45] },
    { id: 'pushing',     label: 'Pushing',      file: 'clawd-working-pushing.svg',     vb: [-15,-25,45,45] },
    { id: 'carrying',    label: 'Carrying',     file: 'clawd-working-carrying.svg',    vb: [-15,-25,45,45] },
    { id: 'overheated',  label: 'Overheated',   file: 'clawd-working-overheated.svg',  vb: [-15,-25,45,45] },
    { id: 'beacon',      label: 'Beacon',       file: 'clawd-working-beacon.svg',      vb: [-15,-25,45,45] },
    { id: 'idle',        label: 'Idle',         file: 'clawd-idle-living.svg',         vb: [-15,-25,45,45] },
    { id: 'sleeping',    label: 'Sleeping',     file: 'clawd-sleeping.svg',            vb: [-10,-20,40,40] },
    { id: 'happy',       label: 'Happy',        file: 'clawd-happy.svg',               vb: [-12,-15,40,40] },
    { id: 'notification',label: 'Notification', file: 'clawd-notification.svg',        vb: [-15,-25,45,45] },
    { id: 'disconnected',label: 'Disconnected', file: 'clawd-disconnected.svg',        vb: [-10,-20,50,40] },
    { id: 'static',      label: 'Static',       file: 'clawd-static-base.svg',         vb: [0,0,15,16] },
  ],
  'mini-crab': [
    { id: 'typing', label: 'Typing', file: 'mini-crab-typing.svg', vb: [-2,-2,12,12] },
  ],
  'hud-counter': [], // no SVG anims — drawn on canvas
};

const SPRITE_META = {
  clawd:      { label: 'Clawd',     color: '#DE886D', defaultScale: 4.267, defaultAnim: 'typing',
                bodyLocal: { x:0, y:6, w:15, h:9 }, footY: 15 },
  'mini-crab':{ label: 'Mini-Crab', color: '#FFC107', defaultScale: 4.0,   defaultAnim: 'typing',
                bodyLocal: { x:-0.5, y:3.5, w:8.3, h:5 }, footY: 8.5 },
  'hud-counter':{ label: 'HUD Counter', color: '#FFC107', defaultScale: 2.0, defaultAnim: '',
                  bodyLocal: { x:0, y:0, w:24, h:10 }, footY: 10, isCanvasDrawn: true },
};

// ═══ Pixel-art digit bitmaps (5 wide × 5 tall, each row is a bitmask) ═══
const DIGITS = {
  '0': [0b11111, 0b10001, 0b10001, 0b10001, 0b11111],
  '1': [0b01100, 0b10100, 0b00100, 0b00100, 0b11111],
  '2': [0b11111, 0b00001, 0b11111, 0b10000, 0b11111],
  '3': [0b11111, 0b00001, 0b11111, 0b00001, 0b11111],
  '4': [0b10001, 0b10001, 0b11111, 0b00001, 0b00001],
  '5': [0b11111, 0b10000, 0b11111, 0b00001, 0b11111],
  '6': [0b11111, 0b10000, 0b11111, 0b10001, 0b11111],
  '7': [0b11111, 0b00001, 0b00010, 0b00100, 0b00100],
  '8': [0b11111, 0b10001, 0b11111, 0b10001, 0b11111],
  '9': [0b11111, 0b10001, 0b11111, 0b00001, 0b11111],
  'x': [0b00000, 0b10001, 0b01010, 0b00100, 0b01010], // × symbol (only 4 rows used, shifted down)
};
// Draw a pixel-art character at (px, py) with given pixel size
function drawPixelChar(ctx, charMap, px, py, pxSize) {
  for (let row = 0; row < charMap.length; row++) {
    for (let col = 0; col < 5; col++) {
      if (charMap[row] & (1 << (4 - col))) {
        ctx.fillRect(px + col * pxSize, py + row * pxSize, pxSize, pxSize);
      }
    }
  }
}
// Draw "×N" string at position
function drawPixelCounter(ctx, count, px, py, pxSize) {
  // × symbol (5 rows but using 'x' which is shifted)
  const xChar = [0b10001, 0b01010, 0b00100, 0b01010, 0b10001];
  drawPixelChar(ctx, xChar, px, py, pxSize);
  // digits
  const str = String(count);
  let dx = px + 6 * pxSize; // gap after ×
  for (const ch of str) {
    if (DIGITS[ch]) {
      drawPixelChar(ctx, DIGITS[ch], dx, py, pxSize);
      dx += 6 * pxSize; // 5 wide + 1 gap
    }
  }
}
// Draw mini-crab icon (static, for HUD)
function drawMiniCrabIcon(ctx, px, py, s) {
  ctx.save();
  ctx.translate(px, py);
  ctx.scale(s, s);
  ctx.fillStyle = '#DE886D';
  // Legs
  ctx.fillRect(1.5, 7, .8, 1.5); ctx.fillRect(2.7, 7, .8, 1.5);
  ctx.fillRect(3.8, 7, .8, 1.5); ctx.fillRect(5.0, 7, .8, 1.5);
  // Body
  ctx.fillRect(1, 3.5, 5.3, 3.5);
  // Arms
  ctx.fillRect(-.5, 4, 1.3, 1.2); ctx.fillRect(6.5, 4, 1.3, 1.2);
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(2.2, 4.2, .8, 1); ctx.fillRect(4.3, 4.2, .8, 1);
  ctx.restore();
}

// ═══ State ═══
let sprites = [], selectedId = null, mode = 'full', nextId = 1;

// ═══ Canvas ═══
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const frame = document.getElementById('display-frame');
canvas.width = DW * Z; canvas.height = DH * Z;
canvas.style.width = DW * Z + 'px'; canvas.style.height = DH * Z + 'px';
frame.style.width = DW * Z + 'px'; frame.style.height = DH * Z + 'px';

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save(); ctx.scale(Z, Z);

  // Sky
  ctx.fillStyle = '#080812'; ctx.fillRect(0, 0, DW, DH);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  [[20,15,2],[55,8,1],[140,5,2],[220,10,1],[280,18,2],[90,22,1],[300,12,1]].forEach(([x,y,s]) => ctx.fillRect(x,y,s,s));

  // Grid
  if (document.getElementById('show-grid').checked) {
    ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 0.5;
    for (let x=0;x<=DW;x+=16){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,DH);ctx.stroke();}
    for (let y=0;y<=DH;y+=16){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(DW,y);ctx.stroke();}
  }

  // Grass (14px tall at bottom, matching firmware GRASS_HEIGHT)
  if (document.getElementById('show-grass').checked) {
    const gw = mode === 'narrow' ? DIV_X : DW;
    // Grass background with gradient feel
    ctx.fillStyle = '#2d4a2d'; ctx.fillRect(0, GRASS_TOP, gw, GRASS_HEIGHT);
    ctx.fillStyle = '#1a331a'; ctx.fillRect(0, GRASS_TOP + 7, gw, GRASS_HEIGHT - 7);
    // Tufts (matching firmware tufts)
    ctx.fillStyle = '#3d6a3d';
    [8,25,50,78,100,130,155].forEach(x => { if (x < gw) ctx.fillRect(x, GRASS_TOP, 3, 3); });
    // Grass top line marker
    ctx.strokeStyle = 'rgba(76,175,80,0.3)'; ctx.lineWidth = 0.5;
    ctx.setLineDash([4,4]); ctx.beginPath(); ctx.moveTo(0,GRASS_TOP); ctx.lineTo(gw,GRASS_TOP); ctx.stroke(); ctx.setLineDash([]);
    // Foot line marker (where sprites' feet land, 8px into grass)
    ctx.strokeStyle = 'rgba(255,82,82,0.3)';
    ctx.beginPath(); ctx.moveTo(0,FOOT_Y); ctx.lineTo(gw,FOOT_Y); ctx.stroke(); ctx.setLineDash([]);
  }

  // Divider
  if (mode === 'narrow' || document.getElementById('show-divider').checked) {
    ctx.fillStyle = 'rgba(255,255,255,0.06)'; ctx.fillRect(DIV_X, 0, 1, DH);
    if (mode === 'narrow') {
      // Notification placeholders
      ctx.fillStyle = 'rgba(0,130,252,0.08)'; ctx.fillRect(115,8,197,100);
      ctx.strokeStyle = 'rgba(0,130,252,0.25)'; ctx.lineWidth = 0.5; ctx.strokeRect(115,8,197,100);
      ctx.fillStyle = '#8BC6FC'; ctx.font = '10px system-ui'; ctx.fillText('Build complete', 127, 50);
      ctx.fillStyle = 'rgba(255,193,7,0.06)'; ctx.fillRect(115,118,197,46);
      ctx.strokeStyle = 'rgba(255,193,7,0.2)'; ctx.strokeRect(115,118,197,46);
      ctx.fillStyle = '#FFD54F'; ctx.font = '9px system-ui'; ctx.fillText('3 tests skipped', 127, 138);
    }
  }

  // Draw canvas-rendered sprites (HUD counters)
  sprites.filter(s => SPRITE_META[s.type].isCanvasDrawn).forEach(s => {
    const count = s.count || 1;
    const sc = s.scale;
    // Mini-crab icon (local coords ~8 units wide, ~5 units body)
    drawMiniCrabIcon(ctx, s.x, s.y, sc);
    // ×N text — positioned to the right of the crab, vertically centered
    const crabW = 8 * sc; // icon width in display px
    const pxSize = sc * 0.8; // pixel size for text
    const textX = s.x + crabW + 2 * sc;
    const textY = s.y + 3.5 * sc; // align with crab body center
    ctx.fillStyle = '#FFC107';
    drawPixelCounter(ctx, count, textX, textY, pxSize);
  });

  ctx.restore();
  updateSprites();
  updateInfoTexts();
  updateExport();
}

// ═══ Sprite img + handle management ═══
function getAnim(sprite) {
  const list = ANIMS[sprite.type] || [];
  return list.find(a => a.id === sprite.anim) || list[0];
}

function updateSprites() {
  const imgLayer = document.getElementById('sprite-layer');
  const handleLayer = document.getElementById('handle-layer');

  // Sort: clawds first (behind), mini-crabs on top
  const sorted = [...sprites].sort((a,b) => (a.type==='clawd'?0:1) - (b.type==='clawd'?0:1));

  // Ensure img + handle elements exist
  sorted.forEach(s => {
    const meta = SPRITE_META[s.type];

    // ─── IMG element (skip for canvas-drawn types) ───
    if (!meta.isCanvasDrawn) {
      const anim = getAnim(s);
      if (!anim) return;
      const vb = anim.vb;
      let img = imgLayer.querySelector(`[data-id="${s.id}"]`);
      if (!img) {
        img = document.createElement('img');
        img.dataset.id = s.id;
        img.className = 'sprite-img';
        imgLayer.appendChild(img);
      }
      const src = SVG_DIR + anim.file;
      if (img.src !== new URL(src, location.href).href) img.src = src;
      const ix = (s.x + vb[0] * s.scale) * Z;
      const iy = (s.y + vb[1] * s.scale) * Z;
      const iw = vb[2] * s.scale * Z;
      const ih = vb[3] * s.scale * Z;
      img.style.left = ix + 'px';
      img.style.top = iy + 'px';
      img.style.width = iw + 'px';
      img.style.height = ih + 'px';
      img.style.zIndex = s.type === 'clawd' ? 1 : 2;
    }

    // ─── Handle element (covers body area) ───
    let handle = handleLayer.querySelector(`[data-id="${s.id}"]`);
    if (!handle) {
      handle = document.createElement('div');
      handle.dataset.id = s.id;
      handle.className = 'sprite-handle';
      handle.innerHTML = '<span class="sprite-label"></span>';
      handleLayer.appendChild(handle);
    }
    const bl = meta.bodyLocal;
    const hx = (s.x + bl.x * s.scale) * Z;
    const hy = (s.y + bl.y * s.scale) * Z;
    const hw = bl.w * s.scale * Z;
    const hh = bl.h * s.scale * Z;
    handle.style.left = hx + 'px';
    handle.style.top = hy + 'px';
    handle.style.width = hw + 'px';
    handle.style.height = hh + 'px';
    handle.style.zIndex = 10;
    handle.classList.toggle('selected', s.id === selectedId);
    const lbl = handle.querySelector('.sprite-label');
    lbl.textContent = `${meta.label} (${Math.round(s.x)}, ${Math.round(s.y)})`;
    lbl.style.color = meta.color;
  });

  // Remove stale elements
  imgLayer.querySelectorAll('.sprite-img').forEach(el => {
    if (!sprites.find(s => s.id === el.dataset.id)) el.remove();
  });
  handleLayer.querySelectorAll('.sprite-handle').forEach(el => {
    if (!sprites.find(s => s.id === el.dataset.id)) el.remove();
  });
}

// ═══ Add / remove ═══
function addSprite(type) {
  const meta = SPRITE_META[type];
  const cx = mode === 'narrow' ? DIV_X / 2 : DW / 2;
  const y = FOOT_Y - meta.footY * meta.defaultScale;
  sprites.push({
    id: 'sprite-' + (nextId++), type,
    x: Math.round(cx - (meta.bodyLocal.w * meta.defaultScale) / 2),
    y: Math.round(y),
    scale: meta.defaultScale,
    anim: meta.defaultAnim,
  });
  selectedId = sprites[sprites.length - 1].id;
  rebuildControls(); render();
}

function removeSprite(id) {
  sprites = sprites.filter(s => s.id !== id);
  if (selectedId === id) selectedId = sprites.length ? sprites[sprites.length-1].id : null;
  rebuildControls(); render();
}

function snapToGrass(id) {
  const s = sprites.find(sp => sp.id === id);
  if (!s) return;
  // Place feet at FOOT_Y (8px into grass, matching firmware y_offset=8)
  s.y = Math.round(FOOT_Y - SPRITE_META[s.type].footY * s.scale);
  rebuildControls(); render();
}

function addHudCounter() {
  sprites.push({
    id: 'sprite-' + (nextId++), type: 'hud-counter',
    x: 4, y: 4, scale: 2.0, anim: '', count: 3,
  });
  selectedId = sprites[sprites.length - 1].id;
  rebuildControls(); render();
}

function centerX(idx) {
  const s = sprites[idx];
  if (!s) return;
  const meta = SPRITE_META[s.type];
  const bl = meta.bodyLocal;
  // Center of screen (full or narrow scene)
  const screenCenter = mode === 'narrow' ? DIV_X / 2 : DW / 2;
  // Body center in local coords
  const bodyCenterLocal = bl.x + bl.w / 2;
  // Set x so body center aligns with screen center
  s.x = Math.round(screenCenter - bodyCenterLocal * s.scale);
  rebuildControls(); render();
}

// ═══ Controls ═══
function rebuildControls() {
  const c = document.getElementById('sprite-controls');
  c.innerHTML = '';
  sprites.forEach((s, i) => {
    const meta = SPRITE_META[s.type];
    const bl = meta.bodyLocal;
    const animList = ANIMS[s.type] || [];
    const footGlobal = Math.round(s.y + meta.footY * s.scale);
    const isSel = s.id === selectedId;

    const div = document.createElement('div');
    div.className = 'ctrl-group' + (isSel ? ' selected' : '');
    div.onclick = e => { if (!['INPUT','SELECT','BUTTON'].includes(e.target.tagName)) { selectedId=s.id; rebuildControls(); render(); } };

    div.innerHTML = `
      <h3>
        <span class="dot" style="background:${meta.color}"></span>
        ${meta.label} #${i+1}
        <span style="flex:1"></span>
        <button class="btn" style="font-size:10px;padding:2px 6px;" onclick="event.stopPropagation();snapToGrass('${s.id}')">Snap grass</button>
        <button class="btn btn-danger" onclick="event.stopPropagation();removeSprite('${s.id}')">×</button>
      </h3>
      ${animList.length > 0 ? `<div class="ctrl-row">
        <label>Anim</label>
        <select onchange="sprites[${i}].anim=this.value;render()">
          ${animList.map(a => `<option value="${a.id}" ${a.id===s.anim?'selected':''}>${a.label}</option>`).join('')}
        </select>
      </div>` : ''}
      ${s.type === 'hud-counter' ? `<div class="ctrl-row">
        <label>Count</label>
        <input type="range" min="1" max="20" step="1" value="${s.count||1}"
          oninput="sprites[${i}].count=+this.value;this.parentNode.querySelector('.num').value=this.value;render()">
        <input type="number" class="num" value="${s.count||1}" min="1" max="20" style="width:50px"
          oninput="sprites[${i}].count=+this.value;this.parentNode.querySelector('input[type=range]').value=this.value;render()">
      </div>` : ''}
      <div class="ctrl-row">
        <label>X</label>
        <input type="range" min="${mode==='narrow'?-30:'-50'}" max="${mode==='narrow'?DIV_X:DW}" step="1" value="${Math.round(s.x)}"
          oninput="sprites[${i}].x=+this.value;this.parentNode.querySelector('.num').value=this.value;render()">
        <input type="number" class="num" value="${Math.round(s.x)}" style="width:50px"
          oninput="sprites[${i}].x=+this.value;this.parentNode.querySelector('input[type=range]').value=this.value;render()">
        <button class="btn" style="font-size:9px;padding:2px 5px;" onclick="event.stopPropagation();centerX(${i})">Center</button>
      </div>
      <div class="ctrl-row">
        <label>Y</label>
        <input type="range" min="0" max="${DH}" step="1" value="${Math.round(s.y)}"
          oninput="sprites[${i}].y=+this.value;this.parentNode.querySelector('.num').value=this.value;render()">
        <input type="number" class="num" value="${Math.round(s.y)}" style="width:50px"
          oninput="sprites[${i}].y=+this.value;this.parentNode.querySelector('input[type=range]').value=this.value;render()">
      </div>
      <div class="ctrl-row">
        <label>Scale</label>
        <input type="range" min="0.5" max="8" step="0.05" value="${s.scale}"
          oninput="sprites[${i}].scale=+this.value;this.parentNode.querySelector('.num').value=(+this.value).toFixed(2);render()">
        <input type="number" class="num" value="${s.scale.toFixed(2)}" step="0.05" style="width:55px"
          oninput="sprites[${i}].scale=+this.value;this.parentNode.querySelector('input[type=range]').value=this.value;render()">
      </div>
      <div class="body-info" data-info-id="${s.id}"></div>
    `;
    c.appendChild(div);
  });
}

// ═══ Live info text (updates without rebuilding controls) ═══
function updateInfoTexts() {
  sprites.forEach(s => {
    const el = document.querySelector(`[data-info-id="${s.id}"]`);
    if (!el) return;
    const bl = SPRITE_META[s.type].bodyLocal;
    const footGlobal = Math.round(s.y + SPRITE_META[s.type].footY * s.scale);
    const footStatus = footGlobal===FOOT_Y ? '✓ in grass (firmware match)'
      : footGlobal<GRASS_TOP ? '↑ above grass by '+(GRASS_TOP-footGlobal)+'px'
      : footGlobal<FOOT_Y ? '↑ '+(FOOT_Y-footGlobal)+'px above target'
      : '↓ '+(footGlobal-FOOT_Y)+'px below target';
    el.innerHTML =
      `size: ${Math.round(bl.w*s.scale)}×${Math.round(bl.h*s.scale)}px`
      + ` | x: ${Math.round(s.x+bl.x*s.scale)}→${Math.round(s.x+(bl.x+bl.w)*s.scale)}`
      + ` | y: ${Math.round(s.y+bl.y*s.scale)}→${Math.round(s.y+(bl.y+bl.h)*s.scale)}`
      + `<br>foot: y=${footGlobal} ${footStatus}`;
  });
}

// ═══ Export ═══
function getExportData() {
  return {
    mode,
    sprites: sprites.map(s => {
      const d = { type: s.type, x: Math.round(s.x), y: Math.round(s.y), scale: +s.scale.toFixed(2) };
      if (s.anim) d.anim = s.anim;
      if (s.count) d.count = s.count;
      return d;
    }),
  };
}

function updateExport() {
  const box = document.getElementById('export-box');
  if (!sprites.length) { box.textContent = 'Add sprites to see coordinates...'; return; }
  const lines = sprites.map((s, i) => {
    const meta = SPRITE_META[s.type];
    const anim = getAnim(s);
    const footY = Math.round(s.y + meta.footY * s.scale);
    return `${meta.label} #${i+1} [${anim?anim.label:'?'}]\n  translate(${Math.round(s.x)}, ${Math.round(s.y)}) scale(${s.scale.toFixed(2)})\n  foot y=${footY}`;
  });
  lines.push(`\nMode: ${mode==='narrow'?'Narrow (107px)':'Full (320px)'}`);
  lines.push('\n--- JSON (use this to import) ---');
  lines.push(JSON.stringify(getExportData()));
  box.textContent = lines.join('\n\n');
}

function copyExport(ev) {
  // Copy only the JSON line for clean import
  const json = JSON.stringify(getExportData());
  navigator.clipboard.writeText(json).then(() => {
    const b = ev.target; b.textContent = 'Copied!'; setTimeout(() => b.textContent = 'Copy', 1200);
  });
}

function showImport() {
  const d = document.getElementById('import-area');
  d.style.display = d.style.display === 'none' ? 'block' : 'none';
  if (d.style.display === 'block') d.querySelector('textarea').focus();
}

function doImport() {
  const ta = document.querySelector('#import-area textarea');
  let text = ta.value.trim();
  // Try to extract JSON from pasted export (may contain human-readable lines above)
  const jsonMatch = text.match(/\{.*"sprites".*\}/s);
  if (jsonMatch) text = jsonMatch[0];
  try {
    const data = JSON.parse(text);
    if (!data.sprites || !Array.isArray(data.sprites)) throw new Error('Missing sprites array');
    sprites = [];
    selectedId = null;
    if (data.mode) setMode(data.mode);
    data.sprites.forEach(p => {
      if (!SPRITE_META[p.type]) return;
      const sp = { id: 'sprite-' + (nextId++), type: p.type, x: p.x||0, y: p.y||0, scale: p.scale||SPRITE_META[p.type].defaultScale, anim: p.anim||SPRITE_META[p.type].defaultAnim };
      if (p.count) sp.count = p.count;
      sprites.push(sp);
    });
    if (sprites.length) selectedId = sprites[0].id;
    rebuildControls(); render();
    ta.value = '';
    document.getElementById('import-area').style.display = 'none';
  } catch (e) {
    alert('Import failed: ' + e.message);
  }
}

// ═══ Presets ═══
function loadPreset(name) {
  sprites = []; selectedId = null;
  const P = {
    // FOOT_Y=166. Clawd foot at local y=15: translate_Y = 166 - 15*scale
    // Mini-crab foot at local y=8.5: translate_Y = 166 - 8.5*scale
    '1s0a': () => { setMode('full'); return [
      { type:'clawd', x:128, y:Math.round(166-15*4.267), scale:4.267, anim:'typing' },
    ];},
    '1s3a': () => { setMode('full'); return [
      { type:'clawd', x:63, y:Math.round(166-15*4.267), scale:4.267, anim:'typing' },
      { type:'mini-crab', x:152, y:Math.round(166-8.5*4.0), scale:4.0, anim:'typing' },
      { type:'mini-crab', x:209, y:Math.round(166-8.5*4.0), scale:4.0, anim:'typing' },
      { type:'mini-crab', x:266, y:Math.round(166-8.5*4.0), scale:4.0, anim:'typing' },
    ];},
    '2s2a': () => { setMode('full'); return [
      { type:'clawd', x:18, y:Math.round(166-15*4.267), scale:4.267, anim:'typing' },
      { type:'mini-crab', x:104, y:Math.round(166-8.5*4.0), scale:4.0, anim:'typing' },
      { type:'mini-crab', x:172, y:Math.round(166-8.5*4.0), scale:4.0, anim:'typing' },
      { type:'clawd', x:238, y:Math.round(166-15*4.267), scale:4.267, anim:'thinking' },
    ];},
    'narrow': () => { setMode('narrow'); return [
      { type:'clawd', x:21, y:Math.round(166-15*4.27), scale:4.27, anim:'typing' },
      { type:'hud-counter', x:4, y:4, scale:2.0, count:3 },
    ];},
  };
  const fn = P[name]; if (!fn) return;
  const list = fn();
  list.forEach(p => sprites.push({ id:'sprite-'+(nextId++), ...p }));
  if (sprites.length) selectedId = sprites[0].id;
  rebuildControls(); render();
}

// ═══ Mode ═══
function setMode(m) {
  mode = m;
  document.getElementById('mode-full').classList.toggle('active', m==='full');
  document.getElementById('mode-narrow').classList.toggle('active', m==='narrow');
  document.getElementById('show-divider').checked = m==='narrow';
  render();
}

// ═══ Drag ═══
document.getElementById('handle-layer').addEventListener('mousedown', e => {
  const h = e.target.closest('.sprite-handle');
  if (!h) return;
  const s = sprites.find(sp => sp.id === h.dataset.id);
  if (!s) return;
  selectedId = s.id; rebuildControls();
  const mx0 = e.clientX, my0 = e.clientY, sx0 = s.x, sy0 = s.y;
  h.classList.add('dragging');
  const snap = document.getElementById('snap-grid').checked;
  function onMove(ev) {
    let nx = sx0 + (ev.clientX - mx0) / Z, ny = sy0 + (ev.clientY - my0) / Z;
    if (snap) { nx = Math.round(nx); ny = Math.round(ny); }
    s.x = nx; s.y = ny;
    rebuildControls(); render();
  }
  function onUp() { h.classList.remove('dragging'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  e.preventDefault();
});

// ═══ Mouse readout ═══
frame.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  const px = Math.floor((e.clientX - r.left) / Z), py = Math.floor((e.clientY - r.top) / Z);
  document.getElementById('coord-readout').textContent = `x=${px} y=${py}`;
});

// ═══ Keyboard ═══
document.addEventListener('keydown', e => {
  if (['INPUT','SELECT','TEXTAREA'].includes(document.activeElement.tagName)) return;
  const s = sprites.find(sp => sp.id === selectedId);
  if (!s) return;
  const step = e.shiftKey ? 8 : 1;
  if (e.key==='ArrowLeft')  { s.x -= step; e.preventDefault(); }
  if (e.key==='ArrowRight') { s.x += step; e.preventDefault(); }
  if (e.key==='ArrowUp')    { s.y -= step; e.preventDefault(); }
  if (e.key==='ArrowDown')  { s.y += step; e.preventDefault(); }
  if (e.key==='Delete'||e.key==='Backspace') { removeSprite(selectedId); return; }
  rebuildControls(); render();
});

// ═══ Init ═══
loadPreset('1s3a');
</script>
</body>
