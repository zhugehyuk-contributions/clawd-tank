<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .digging-body {
        animation: dig-down 3s forwards linear;
      }
      .digging-arm-l {
        animation: frantic-dig-l 0.15s infinite ease-in-out;
      }
      .digging-arm-r {
        animation: frantic-dig-r 0.15s infinite ease-in-out;
      }
      .digging-legs {
        animation: frantic-kick 0.15s infinite ease-in-out;
      }
      .hole {
        transform-origin: 0px 0.5px;
        animation: hole-open-close 3s forwards linear;
      }
      .dirt-group {
        animation: show-dirt 3s forwards linear;
      }
      .dirt-particle {
        opacity: 0;
        animation: fly-dirt 0.5s infinite linear;
      }
      
      /* Stagger dirt particles */
      .d1 { animation-delay: 0.0s; }
      .d2 { animation-delay: 0.1s; }
      .d3 { animation-delay: 0.2s; }
      .d4 { animation-delay: 0.3s; }
      .d5 { animation-delay: 0.05s; }
      .d6 { animation-delay: 0.15s; }
      .d7 { animation-delay: 0.25s; }
      .d8 { animation-delay: 0.35s; }

      @keyframes dig-down {
        0% { transform: translateY(0); }
        25% { transform: translateY(0); }
        50% { transform: translateY(18px); }
        100% { transform: translateY(18px); }
      }

      @keyframes frantic-dig-l {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-1px); }
      }

      @keyframes frantic-dig-r {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(1px); }
      }

      @keyframes frantic-kick {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-1px); }
      }

      @keyframes hole-open-close {
        0% { transform: scale(0); opacity: 0; }
        5% { transform: scale(0); opacity: 0; }
        10% { transform: scale(2); opacity: 1; }
        50% { transform: scale(2); opacity: 1; }
        55% { transform: scale(0); opacity: 0; }
        100% { transform: scale(0); opacity: 0; }
      }

      @keyframes show-dirt {
        0% { opacity: 0; }
        5% { opacity: 0; }
        6% { opacity: 1; }
        50% { opacity: 1; }
        51% { opacity: 0; }
        100% { opacity: 0; }
      }

      @keyframes fly-dirt {
        0% { opacity: 0; transform: translate(0, 0); }
        10% { opacity: 1; transform: translate(0, 0); }
        70% { opacity: 1; transform: translate(calc(var(--tx) * 0.8), calc(var(--ty) * 0.8)); }
        90% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
        100% { opacity: 0; transform: translate(var(--tx), var(--ty)); }
      }
    </style>
    
    <g id="dirt">
      <rect x="0" y="0" width="1.5" height="1.5" fill="#5D4037" />
    </g>

    <clipPath id="ground-clip">
      <rect x="-15" y="-25" width="45" height="40" />
    </clipPath>
  </defs>

  <!-- The hole -->
  <g transform="translate(7.5, 15)">
    <rect id="ground-shadow" x="-4.5" y="0" width="9" height="1" fill="#000000" class="hole" />
  </g>

  <!-- Dirt Particles flying out during the dig phase -->
  <g class="dirt-group" transform="translate(7.5, 15)">
    <use href="#dirt" class="dirt-particle d1" style="--tx: -12px; --ty: -8px;" x="-2" y="0" />
    <use href="#dirt" class="dirt-particle d2" style="--tx: 14px; --ty: -10px;" x="2" y="0" />
    <use href="#dirt" class="dirt-particle d3" style="--tx: -18px; --ty: -4px;" x="-4" y="0" />
    <use href="#dirt" class="dirt-particle d4" style="--tx: 12px; --ty: -14px;" x="4" y="0" />
    <use href="#dirt" class="dirt-particle d5" style="--tx: -10px; --ty: -12px;" x="-1" y="0" />
    <use href="#dirt" class="dirt-particle d6" style="--tx: 16px; --ty: -6px;" x="1" y="0" />
    <use href="#dirt" class="dirt-particle d7" style="--tx: -15px; --ty: -16px;" x="-3" y="0" />
    <use href="#dirt" class="dirt-particle d8" style="--tx: 10px; --ty: -8px;" x="3" y="0" />
  </g>

  <!-- Clawd masked by the ground line -->
  <g id="master-group" clip-path="url(#ground-clip)">
    <g class="digging-body">
      
      <g id="body-color-group" fill="#DE886D">
        <rect id="torso" x="2" y="6" width="11" height="7"/>
        
        <g class="digging-arm-l">
          <rect id="left-arm" x="0" y="9" width="2" height="2"/>
        </g>
        
        <g class="digging-arm-r">
          <rect id="right-arm" x="13" y="9" width="2" height="2"/>
        </g>
        
        <g class="digging-legs">
          <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
          <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
          <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
          <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
        </g>
      </g>
      
      <g id="eyes-color-group" fill="#000000">
        <rect id="left-eye" x="4" y="8" width="1" height="2"/>
        <rect id="right-eye" x="10" y="8" width="1" height="2"/>
      </g>
      
    </g>
  </g>
</svg>