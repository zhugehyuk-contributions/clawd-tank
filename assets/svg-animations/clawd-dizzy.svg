<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .body-anim-rot {
        transform-origin: 7.5px 15px; /* Pivot at the feet */
        animation: dizzy-rot 4s infinite ease-in-out;
      }
      
      .star {
        animation: star-orbit 3s infinite linear;
      }
      .star-1 { animation-delay: 0s; }
      .star-2 { animation-delay: -1s; }
      .star-3 { animation-delay: -2s; }

      /* Swaying back and forth from the feet */
      @keyframes dizzy-rot {
        0%, 100% { transform: rotate(-6deg); }
        50% { transform: rotate(6deg); }
      }

      /* Elliptical 3D-ish orbit for stars */
      @keyframes star-orbit {
        0%, 100% { transform: translate(-10px, 0px) scale(0.85); opacity: 1; }
        12.5% { transform: translate(-7px, 2px) scale(0.97); opacity: 1; }
        25% { transform: translate(0px, 3px) scale(1.1); opacity: 1; }
        37.5% { transform: translate(7px, 2px) scale(0.97); opacity: 1; }
        50% { transform: translate(10px, 0px) scale(0.85); opacity: 1; }
        62.5% { transform: translate(7px, -2px) scale(0.72); opacity: 0.8; }
        75% { transform: translate(0px, -3px) scale(0.6); opacity: 0.4; }
        87.5% { transform: translate(-7px, -2px) scale(0.72); opacity: 0.8; }
      }
    </style>
    
    <g id="pixel-star" fill="#FFC107">
      <rect x="1" y="0" width="1" height="1"/>
      <rect x="0" y="1" width="3" height="1"/>
      <rect x="1" y="2" width="1" height="1"/>
    </g>
  </defs>

  <!-- Character Ground Shadow -->
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <!-- Animated Character (Body + Legs) -->
  <g class="body-anim-rot">
      
      <!-- Character Legs -->
      <g id="legs" fill="#DE886D">
        <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
        <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
        <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
        <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
      </g>

      <!-- Body Color Group -->
      <g id="body-color-group" fill="#DE886D">
        <rect id="torso" x="2" y="6" width="11" height="7"/>
        <rect id="left-arm" x="0" y="9" width="2" height="2"/>
        <rect id="right-arm" x="13" y="9" width="2" height="2"/>
      </g>
      

      <!-- Eyes Color Group with X Extensions -->
      <g id="eyes-color-group" fill="#000000">
        <!-- Original Eyes serving as center of X -->
        <rect id="left-eye" x="4" y="8" width="1" height="1"/>
        <rect id="right-eye" x="10" y="8" width="1" height="1"/>
        
        <!-- Left Eye X Extensions -->
        <rect x="3" y="7" width="1" height="1"/>
        <rect x="5" y="7" width="1" height="1"/>
        <rect x="3" y="9" width="1" height="1"/>
        <rect x="5" y="9" width="1" height="1"/>

        <!-- Right Eye X Extensions -->
        <rect x="9" y="7" width="1" height="1"/>
        <rect x="11" y="7" width="1" height="1"/>
        <rect x="9" y="9" width="1" height="1"/>
        <rect x="11" y="9" width="1" height="1"/>
      </g>
    </g>

  <!-- Orbiting Stars -->
  <g transform="translate(7.5, 2)">
    <g class="star star-1"><use href="#pixel-star" transform="translate(-1.5, -1.5)"/></g>
    <g class="star star-2"><use href="#pixel-star" transform="translate(-1.5, -1.5)"/></g>
    <g class="star star-3"><use href="#pixel-star" transform="translate(-1.5, -1.5)"/></g>
  </g>
</svg>
