<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      .body-sway {
        transform-origin: 7.5px 13px;
        animation: sway 4s infinite ease-in-out;
      }
      @keyframes sway {
        0% { transform: rotate(0deg) translate(0px, 0px); }
        25% { transform: rotate(4deg) translate(0px, 0px); }
        50% { transform: rotate(0deg) translate(0px, 0px); }
        75% { transform: rotate(-4deg) translate(0px, 0px); }
        100% { transform: rotate(0deg) translate(0px, 0px); }
      }

      .orbit-x {
        animation: osc-x 3s infinite ease-in-out;
      }
      .orbit-y {
        animation: osc-y 3s infinite;
      }
      .star-1 .orbit-x, .star-1 .orbit-y { animation-delay: 0s; }
      .star-2 .orbit-x, .star-2 .orbit-y { animation-delay: -1s; }
      .star-3 .orbit-x, .star-3 .orbit-y { animation-delay: -2s; }

      @keyframes osc-x {
        0% { transform: translateX(8px); }
        50% { transform: translateX(-8px); }
        100% { transform: translateX(8px); }
      }

      @keyframes osc-y {
        0% { transform: translateY(0px); animation-timing-function: ease-out; }
        25% { transform: translateY(2px); animation-timing-function: ease-in; }
        50% { transform: translateY(0px); animation-timing-function: ease-out; }
        75% { transform: translateY(-2px); animation-timing-function: ease-in; }
        100% { transform: translateY(0px); }
      }
    </style>
    
    <g id="star" fill="#FFD700">
      <rect x="-1" y="0" width="3" height="1"/>
      <rect x="0" y="-1" width="1" height="3"/>
    </g>
  </defs>

  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <g id="legs" fill="#DE886D">
    <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
    <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
    <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
    <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>
  </g>

  <g class="body-sway">
    <g fill="#DE886D">
      <rect id="torso" x="2" y="6" width="11" height="7"/>
      <rect id="left-arm" x="0" y="9" width="2" height="2"/>
      <rect id="right-arm" x="13" y="9" width="2" height="2"/>
    </g>

    <g id="band-aid">
      <rect x="6" y="6" width="3" height="1" fill="#E5AA70"/>
      <rect x="7" y="5" width="1" height="3" fill="#E5AA70"/>
      <rect x="7" y="6" width="1" height="1" fill="#FFFFFF" opacity="0.6"/>
    </g>

    <g fill="#000000">
      <rect id="left-eye" x="4" y="8" width="1" height="2"/>
      <rect id="right-eye" x="10" y="8" width="1" height="2"/>
      
      <rect x="3" y="7" width="1" height="1"/>
      <rect x="5" y="7" width="1" height="1"/>
      <rect x="3" y="10" width="1" height="1"/>
      <rect x="5" y="10" width="1" height="1"/>
      
      <rect x="9" y="7" width="1" height="1"/>
      <rect x="11" y="7" width="1" height="1"/>
      <rect x="9" y="10" width="1" height="1"/>
      <rect x="11" y="10" width="1" height="1"/>
    </g>
  </g>

  <g transform="translate(7.5, 1)">
    <g class="star-1">
      <g class="orbit-x">
        <g class="orbit-y">
          <use href="#star" />
        </g>
      </g>
    </g>
    <g class="star-2">
      <g class="orbit-x">
        <g class="orbit-y">
          <use href="#star" />
        </g>
      </g>
    </g>
    <g class="star-3">
      <g class="orbit-x">
        <g class="orbit-y">
          <use href="#star" />
        </g>
      </g>
    </g>
  </g>
</svg>
