<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" width="500" height="500">
  <defs>
    <style>
      /* Gentle body bob */
      .body-beacon {
        transform-origin: 7.5px 15px;
        animation: beacon-bob 1.5s infinite ease-in-out;
      }

      /* Signal waves expanding outward from antenna */
      .wave {
        fill: none;
        stroke-width: 0.6;
        opacity: 0;
      }
      .wave1 { stroke: #0082FC; animation: wave-expand 2s 0s infinite; }
      .wave2 { stroke: #FFC107; animation: wave-expand 2s 0.5s infinite; }
      .wave3 { stroke: #FF5252; animation: wave-expand 2s 1s infinite; }

      /* Antenna tip blink */
      .antenna-blink {
        animation: ant-blink 0.8s infinite alternate;
      }

      /* Keyframes */
      @keyframes beacon-bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(0.5px); }
      }

      @keyframes wave-expand {
        0% { r: 3; opacity: 0; stroke-width: 1; }
        10% { opacity: 0.7; }
        100% { r: 18; opacity: 0; stroke-width: 0.2; }
      }

      @keyframes ant-blink {
        0% { fill: #FF5252; opacity: 0.5; }
        100% { fill: #FF5252; opacity: 1; }
      }
    </style>
  </defs>

  <!-- Ground Shadow -->
  <rect id="ground-shadow" x="3" y="15" width="9" height="1" fill="#000000" opacity="0.5"/>

  <!-- Signal waves (each = a subagent being directed) -->
  <circle class="wave wave1" cx="7.5" cy="5" r="3"/>
  <circle class="wave wave2" cx="7.5" cy="5" r="3"/>
  <circle class="wave wave3" cx="7.5" cy="5" r="3"/>

  <!-- Animated Character Body -->
  <g class="body-beacon">
    <!-- Antenna -->
    <rect x="7" y="2" width="1" height="4" fill="#78909C"/>
    <circle class="antenna-blink" cx="7.5" cy="1.5" r="1"/>

    <!-- Body Base Color Group -->
    <g id="body-color-group" fill="#DE886D">
      <!-- Static Legs -->
      <rect id="outer-left-leg" x="3" y="13" width="1" height="2"/>
      <rect id="inner-left-leg" x="5" y="13" width="1" height="2"/>
      <rect id="inner-right-leg" x="9" y="13" width="1" height="2"/>
      <rect id="outer-right-leg" x="11" y="13" width="1" height="2"/>

      <!-- Main Torso -->
      <rect id="torso" x="2" y="6" width="11" height="7"/>

      <!-- Arms (slightly raised, alert pose) -->
      <rect id="left-arm" x="0" y="9" width="2" height="2" transform="rotate(15 1 10)"/>
      <rect id="right-arm" x="13" y="9" width="2" height="2" transform="rotate(-15 14 10)"/>
    </g>

    <!-- Eyes Color Group (Wide, alert) -->
    <g fill="#000000">
      <rect id="left-eye" x="4" y="8" width="1.5" height="1.5"/>
      <rect id="right-eye" x="9.5" y="8" width="1.5" height="1.5"/>
    </g>
  </g>
</svg>
