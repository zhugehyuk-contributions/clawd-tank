<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="face-bg" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#E89B83" />
            <stop offset="100%" stop-color="#D47355" />
        </linearGradient>
        <filter id="inner-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff" />
            <feFlood flood-color="white" flood-opacity="0.5" />
            <feComposite in2="shadowDiff" operator="in" />
            <feComposite in2="SourceGraphic" operator="over" />
        </filter>
    </defs>
    
    <!-- Base macOS Squircle acting as the Crab's face -->
    <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#face-bg)" filter="url(#inner-glow)"/>
    
    <!-- Huge Pixel Eyes -->
    <g fill="#111111">
        <!-- Left Eye -->
        <rect x="250" y="350" width="120" height="240" rx="20"/>
        <!-- Right Eye -->
        <rect x="650" y="350" width="120" height="240" rx="20"/>
    </g>
    <!-- Eye Highlights (make it look less lifeless) -->
    <g fill="#FFFFFF">
        <rect x="270" y="380" width="40" height="60" rx="10"/>
        <rect x="670" y="380" width="40" height="60" rx="10"/>
    </g>
    
    <!-- Simple Claws poking in from the sides -->
    <path d="M -50 600 L 150 600 L 150 800 L -50 800 Z" fill="#C46044" rx="30"/>
    <path d="M 874 600 L 1074 600 L 1074 800 L 874 800 Z" fill="#C46044" rx="30"/>
    
    <rect x="0" y="0" width="1024" height="1024" rx="230" fill="none" stroke="#ffffff" stroke-opacity="0.3" stroke-width="8"/>
</svg>
